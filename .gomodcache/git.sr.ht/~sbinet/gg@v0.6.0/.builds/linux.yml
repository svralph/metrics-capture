# SPDX-License-Identifier: Unlicense OR MIT
image: debian/testing
packages:
 - curl
 - unzip
 - wine
sources:
 - https://git.sr.ht/~sbinet/gg
environment:
 GOFLAGS: -mod=readonly
 PATH: /home/build/sdk/go/bin:/usr/bin:/home/build/go/bin
tasks:
 - install_go1_22: |
     mkdir -p /home/build/sdk
     curl -L https://golang.org/dl/go1.22.8.linux-amd64.tar.gz | tar -C /home/build/sdk -xzf -
 - install_test_tools: |
     go install golang.org/x/tools/cmd/goimports@latest
     go install honnef.co/go/tools/cmd/staticcheck@latest
 - test_linux: |
     cd gg
     go test -v -race ./...
     cd examples
     go test -v -race ./...
 - test_windows: |
     cd gg
     GOOS=windows \
        go test -exec=wine ./...
 - check_gofmt: |
     cd gg
     test -z "$(gofmt -s -l .)"
     test -z "$(goimports -l .)"
 - check_staticcheck: |
     cd gg
     staticcheck ./...
 - check_sign_off: |
     set +x -e
     cd gg
     for hash in $(git log -n 5 --format="%H"); do
        message=$(git log -1 --format=%B $hash)
        if [[ ! "$message" =~ "Signed-off-by: " ]]; then
            echo "Missing 'Signed-off-by' in commit $hash"
            exit 1
        fi
     done
